<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#00BFFF" />
    <link rel="manifest" href="manifest.json" />
    <title>FastLine Chats | Sign In</title>
    <link rel="shortcut icon" href="icon-192.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      :root { --bg: #0e0e10; --surface: rgba(20,20,26,0.92); --accent: #00bfff; --accent2: #ff6b00; --text: #ffffff; --text-muted: rgba(255,255,255,0.5); --border: rgba(0,191,255,0.2); --input-bg: rgba(0,191,255,0.06); --error: #ff3366; --success: #00e676; }
      body { font-family: "Times New Roman", Times, serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; position: relative; }
      .bg-layer { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(0,191,255,0.12) 0%, transparent 70%), radial-gradient(ellipse 60% 50% at 80% 70%, rgba(255,107,0,0.08) 0%, transparent 70%), #0e0e10; }
      .grid-lines { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(0,191,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,191,255,0.04) 1px, transparent 1px); background-size: 60px 60px; animation: gridPulse 6s ease-in-out infinite alternate; }
      @keyframes gridPulse { 0% { opacity: 0.4; } 100% { opacity: 0.9; } }
      .particle { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; animation: rise linear infinite; }
      @keyframes rise { 0% { transform: translateY(110vh); opacity: 0; } 10% { opacity: 0.8; } 90% { opacity: 0.4; } 100% { transform: translateY(-10vh); opacity: 0; } }
      .auth-card { position: relative; z-index: 10; width: 100%; max-width: 440px; margin: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 28px; box-shadow: 0 24px 64px rgba(0,0,0,0.5), 0 0 40px rgba(0,191,255,0.08); backdrop-filter: blur(20px); overflow: hidden; animation: slideUp 0.7s cubic-bezier(0.2,0.9,0.4,1.1); }
      @keyframes slideUp { from { opacity: 0; transform: translateY(32px) scale(0.97); } to { opacity: 1; transform: none; } }
      .card-glow { position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border-radius: 28px; z-index: -1; background: linear-gradient(135deg, #00bfff, #ff6b00, #00bfff); opacity: 0.08; filter: blur(8px); animation: glowPulse 3s infinite alternate; }
      @keyframes glowPulse { from { opacity: 0.06; } to { opacity: 0.16; } }
      .card-inner { padding: 2.4rem 2rem 2rem; }
      .logo-area { text-align: center; margin-bottom: 2rem; }
      .logo-ring { width: 80px; height: 80px; margin: 0 auto 1rem; border-radius: 24px; background: linear-gradient(135deg, rgba(0,191,255,0.2), rgba(255,107,0,0.1)); border: 2px solid rgba(0,191,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 2rem; color: var(--accent); box-shadow: 0 0 24px rgba(0,191,255,0.25); animation: logoPulse 3s ease-in-out infinite alternate; }
      @keyframes logoPulse { from { box-shadow: 0 0 16px rgba(0,191,255,0.2); } to { box-shadow: 0 0 36px rgba(0,191,255,0.5); } }
      .brand-name { font-family: "Times New Roman", Times, serif; font-size: 1.7rem; font-weight: 800; background: linear-gradient(120deg, #00bfff, #7df9ff, #00bfff); -webkit-background-clip: text; background-clip: text; color: transparent; letter-spacing: 2px; }
      .tagline { font-size: 0.7rem; letter-spacing: 3px; color: var(--accent); text-transform: uppercase; margin-top: 4px; opacity: 0.8; }
      .tabs { display: flex; gap: 0; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
      .tab { flex: 1; background: none; border: none; padding: 12px; font-family: "Times New Roman", Times, serif; font-size: 0.95rem; font-weight: 600; color: var(--text-muted); cursor: pointer; transition: all 0.2s; border-bottom: 2px solid transparent; }
      .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
      .input-group { margin-bottom: 1.2rem; position: relative; }
      .input-icon { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 1rem; z-index: 2; }
      .input-field { width: 100%; background: var(--input-bg); border: 1.5px solid var(--border); border-radius: 60px; padding: 14px 20px 14px 46px; font-size: 0.98rem; color: var(--text); font-family: "Times New Roman", Times, serif; outline: none; transition: all 0.2s; }
      .input-field::placeholder { color: var(--text-muted); }
      .input-field:focus { border-color: var(--accent); box-shadow: 0 0 16px rgba(0,191,255,0.3); background: rgba(0,191,255,0.1); }
      .input-field.shake { animation: shake 0.4s cubic-bezier(0.36,0.07,0.19,0.97); border-color: var(--error); box-shadow: 0 0 12px rgba(255,51,102,0.4); }
      @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-4px); } 40%,80% { transform: translateX(4px); } }
      .neon-btn { width: 100%; background: linear-gradient(135deg, #00bfff, #0099cc); border: none; border-radius: 60px; padding: 14px; font-size: 0.95rem; font-weight: 700; font-family: "Times New Roman", Times, serif; color: #000; letter-spacing: 1.5px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
      .otp-row { display: flex; gap: 8px; align-items: center; }
      .otp-row .input-group { margin-bottom: 0; flex: 1; }
      .otp-send-btn { border-radius: 60px; border: 1.5px solid var(--border); background: transparent; color: var(--accent); padding: 12px 14px; cursor: pointer; font-family: "Times New Roman", Times, serif; white-space: nowrap; }
      .neon-btn:hover:not(:disabled) { transform: scale(1.02); box-shadow: 0 0 24px rgba(0,191,255,0.5); }
      .neon-btn:disabled { opacity: 0.65; cursor: not-allowed; }
      .neon-btn.secondary { background: transparent; border: 1.5px solid var(--border); color: var(--accent); }
      .msg { font-size: 0.8rem; min-height: 1.2em; margin-top: 0.6rem; transition: color 0.2s; text-align: center; }
      .msg.error { color: var(--error); }
      .msg.success { color: var(--success); }
      .powered { text-align: center; font-size: 0.65rem; letter-spacing: 1.5px; color: var(--text-muted); margin-top: 1.6rem; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 1rem; }
      .page { display: none; }
      .page.active { display: block; }
      .form-footer { text-align: center; margin-top: 1rem; font-size: 0.85rem; color: var(--text-muted); }
      .form-footer a { color: var(--accent); font-weight: 600; cursor: pointer; }
      .toast { position: fixed; top: 20px; right: 20px; z-index: 999; background: rgba(10,10,14,0.95); border-left: 4px solid var(--accent); color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 0.85rem; backdrop-filter: blur(10px); animation: toastIn 0.3s ease; }
      @keyframes toastIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
    </style>
  </head>
  <body>
    <div class="bg-layer"></div>
    <div class="grid-lines"></div>
    <div id="particlesContainer"></div>

    <div class="auth-card">
      <div class="card-glow"></div>
      <div class="card-inner">
        <div class="logo-area">
          <div class="logo-ring"><i class="fas fa-bolt"></i></div>
          <div class="brand-name">FASTLINE</div>
          <div class="tagline">Fast Connections · Smart Future</div>
        </div>

        <div class="tabs">
          <button class="tab active" data-tab="login">Sign In</button>
          <button class="tab" data-tab="signup">Sign Up</button>
        </div>

        <!-- LOGIN -->
        <div id="page-login" class="page active">
          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="loginEmail" class="input-field" placeholder="Email address" autocomplete="email" />
          </div>
          <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="loginPass" class="input-field" placeholder="Password" autocomplete="current-password" />
          </div>
          <button class="neon-btn" id="loginBtn"><i class="fas fa-sign-in-alt"></i> Sign In</button>
          <div class="msg" id="loginMsg"></div>
          <div class="form-footer">Don't have an account? <a id="gotoSignup">Sign Up</a></div>
        </div>

        <!-- SIGNUP -->
        <div id="page-signup" class="page">
          <div class="input-group">
            <i class="fas fa-user input-icon"></i>
            <input type="text" id="signupUsername" class="input-field" placeholder="Username" autocomplete="username" />
          </div>
          <div class="input-group">
            <i class="fas fa-align-left input-icon"></i>
            <input type="text" id="signupDescription" class="input-field" placeholder="Descriptions (optional, can be set on Profile tab)" maxlength="80" />
          </div>
          <div class="input-group">
            <i class="fas fa-envelope input-icon"></i>
            <input type="email" id="signupEmail" class="input-field" placeholder="Email Address" autocomplete="email" />
          </div>
          <div class="otp-row">
            <div class="input-group">
              <i class="fas fa-key input-icon"></i>
              <input type="text" id="signupOtp" class="input-field" placeholder="Enter OTP code" maxlength="6" inputmode="numeric" />
            </div>
            <button class="otp-send-btn" id="sendOtpBtn" type="button">Receive OTP</button>
          </div>
          <div class="input-group">
            <i class="fas fa-lock input-icon"></i>
            <input type="password" id="signupPass" class="input-field" placeholder="Password (min 6 chars)" autocomplete="new-password" />
          </div>
          <button class="neon-btn" id="signupBtn"><i class="fas fa-user-plus"></i> Create Account</button>
          <div class="msg" id="signupMsg"></div>
          <div class="form-footer">Already have an account? <a id="gotoLogin">Sign In</a></div>
        </div>

        <div class="powered"><i class="fas fa-bolt"></i> FastLine Chats · Secure · Realtime</div>
      </div>
    </div>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "./scripts/mock-firebase-app.js",
          "firebase/firestore": "./scripts/mock-firebase-firestore.js"
        }
      }
    </script>

    <script type="module">
      import { initializeApp } from "firebase/app";
      import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "firebase/firestore";

      const firebaseConfig = { apiKey: "local", authDomain: "local", projectId: "fastline-local", storageBucket: "local", messagingSenderId: "0", appId: "0" };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const SESSION_EMAIL_KEY = "fastline_session_email";
      const SESSION_EXPIRY_KEY = "fastline_session_expiry";
      const SESSION_DURATION = 30 * 24 * 60 * 60 * 1000;
      const OTP_KEY = "fastline_signup_otp";
      const SIGNUP_DRAFT_KEY = "fastline_signup_draft";
      const OTP_EXPIRY_MS = 5 * 60 * 1000;
      const EMAILJS_SERVICE_ID = "service_zxs16vo";
      const EMAILJS_TEMPLATE_ID = "template_nyxdbw7";
      const EMAILJS_PUBLIC_KEY = "bzQug4w22xmmQYFAy";

      const saveSession = (email) => {
        localStorage.setItem(SESSION_EMAIL_KEY, email);
        localStorage.setItem(SESSION_EXPIRY_KEY, Date.now() + SESSION_DURATION);
      };
      const getSession = () => {
        const e = localStorage.getItem(SESSION_EMAIL_KEY);
        const x = +localStorage.getItem(SESSION_EXPIRY_KEY);
        return e && Date.now() < x ? e : null;
      };
      const clearSession = () => {
        [SESSION_EMAIL_KEY, SESSION_EXPIRY_KEY, "fastline_username", "fastline_avatar"].forEach(k => localStorage.removeItem(k));
      };
      const emailToId = (e) => e.toLowerCase().replace(/[^a-z0-9]/g, "_");
      const isProfileComplete = (user) => {
        const hasUsername = !!(user?.username || "").trim();
        const hasAvatar = !!(user?.avatar || "").trim();
        return hasUsername && hasAvatar;
      };

      function toast(msg, color = "var(--accent)") {
        const t = document.createElement("div");
        t.className = "toast";
        t.style.borderLeftColor = color;
        t.innerHTML = `<i class="fas fa-bolt" style="color:${color};margin-right:8px"></i>${msg}`;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 5000);
      }

      function shake(el) {
        el.classList.remove("shake");
        void el.offsetWidth;
        el.classList.add("shake");
        setTimeout(() => el.classList.remove("shake"), 500);
      }

      function setMsg(el, text, type = "") {
        el.textContent = text;
        el.className = "msg " + type;
      }

      const saveSignupDraft = () => {
        const draft = {
          username: document.getElementById('signupUsername').value.trim(),
          description: document.getElementById('signupDescription').value.trim(),
          email: document.getElementById('signupEmail').value.trim(),
          otp: document.getElementById('signupOtp').value.trim()
        };
        localStorage.setItem(SIGNUP_DRAFT_KEY, JSON.stringify(draft));
      };

      const loadSignupDraft = () => {
        try {
          const raw = localStorage.getItem(SIGNUP_DRAFT_KEY);
          if (!raw) return;
          const draft = JSON.parse(raw);
          document.getElementById('signupUsername').value = draft.username || '';
          document.getElementById('signupDescription').value = draft.description || '';
          document.getElementById('signupEmail').value = draft.email || '';
          document.getElementById('signupOtp').value = draft.otp || '';
        } catch {
          // Ignore invalid stored draft
        }
      };

      const clearSignupDraft = () => localStorage.removeItem(SIGNUP_DRAFT_KEY);

      function switchTab(tabName) {
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + tabName).classList.add('active');
        localStorage.setItem('fastline_active_auth_tab', tabName);
      }

      const saveOtp = (email, code) => {
        localStorage.setItem(OTP_KEY, JSON.stringify({
          email: email.toLowerCase(),
          code,
          expiresAt: Date.now() + OTP_EXPIRY_MS
        }));
        saveSignupDraft();
      };

      const isEmailJsConfigured = () => {
        return ![EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, EMAILJS_PUBLIC_KEY].some(v => v.startsWith("PUT_YOUR_EMAILJS_"));
      };

      async function sendOtpEmail(toEmail, otpCode) {
        if (!isEmailJsConfigured()) {
          throw new Error("EmailJS is not configured. Add SERVICE ID, TEMPLATE ID, and PUBLIC KEY in login.html.");
        }

        const response = await fetch("https://api.emailjs.com/api/v1.0/email/send", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            service_id: EMAILJS_SERVICE_ID,
            template_id: EMAILJS_TEMPLATE_ID,
            user_id: EMAILJS_PUBLIC_KEY,
            template_params: {
              to_email: toEmail,
              otp_code: otpCode,
              app_name: "FastLine Chats",
              expiry_minutes: "5"
            }
          })
        });

        if (!response.ok) {
          const errText = await response.text();
          throw new Error(errText || "Failed to send OTP email.");
        }
      }

      const verifyOtp = (email, code) => {
        try {
          const raw = localStorage.getItem(OTP_KEY);
          if (!raw) return false;
          const data = JSON.parse(raw);
          if (!data || Date.now() > data.expiresAt) return false;
          return data.email === email.toLowerCase() && data.code === code;
        } catch {
          return false;
        }
      };

      async function redirectAfterLogin(email) {
        const userId = emailToId(email);
        try {
          const snap = await getDoc(doc(db, "users", userId));
          setTimeout(() => {
            if (!snap.exists()) {
              clearSession();
              window.location.href = "login.html";
              return;
            }
            window.location.href = isProfileComplete(snap.data()) ? "fast.html" : "profile.html";
          }, 500);
        } catch {
          setTimeout(() => { window.location.href = "login.html"; }, 500);
        }
      }

      // Check existing session
      const savedEmail = getSession();
      if (savedEmail) {
        redirectAfterLogin(savedEmail);
      }

      // Tabs
      document.querySelectorAll('.tab').forEach(tab => {
        tab.addEventListener('click', () => {
          switchTab(tab.dataset.tab);
        });
      });

      document.getElementById('gotoSignup').addEventListener('click', () => {
        switchTab('signup');
      });
      document.getElementById('gotoLogin').addEventListener('click', () => {
        switchTab('login');
      });

      // LOGIN
      document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPass').value;
        const msg = document.getElementById('loginMsg');
        setMsg(msg, '');

        if (!email || !pass) { setMsg(msg, 'Please fill in all fields.', 'error'); return; }

        const userId = emailToId(email);
        try {
          const snap = await getDoc(doc(db, 'users', userId));
          if (!snap.exists()) { setMsg(msg, 'Account not found. Please sign up.', 'error'); shake(document.getElementById('loginEmail')); return; }
          const userData = snap.data();
          if (userData.password !== pass) { setMsg(msg, 'Incorrect password.', 'error'); shake(document.getElementById('loginPass')); return; }
          setMsg(msg, 'Signing in…', 'success');
          saveSession(email);
          toast('Welcome back!');
          setTimeout(() => redirectAfterLogin(email), 500);
        } catch (err) {
          setMsg(msg, 'Error: ' + err.message, 'error');
        }
      });

      // SIGNUP
      document.getElementById('sendOtpBtn').addEventListener('click', async () => {
        const email = document.getElementById('signupEmail').value.trim();
        const msg = document.getElementById('signupMsg');
        const sendOtpBtn = document.getElementById('sendOtpBtn');
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          setMsg(msg, 'Enter a valid email before requesting OTP.', 'error');
          shake(document.getElementById('signupEmail'));
          return;
        }
        try {
          const userId = emailToId(email);
          const existing = await getDoc(doc(db, 'users', userId));
          if (existing.exists()) {
            setMsg(msg, 'This email is already registered. Use Sign In.', 'error');
            return;
          }

          const code = String(Math.floor(100000 + Math.random() * 900000));
          sendOtpBtn.disabled = true;
          sendOtpBtn.textContent = 'Sending...';
          await sendOtpEmail(email, code);
          saveOtp(email, code);
          switchTab('signup');
          setMsg(msg, 'OTP sent to your email. Enter it to continue.', 'success');
        } catch (err) {
          setMsg(msg, 'Failed to send OTP: ' + err.message, 'error');
        } finally {
          sendOtpBtn.disabled = false;
          sendOtpBtn.textContent = 'Receive OTP';
        }
      });

      document.getElementById('signupBtn').addEventListener('click', async () => {
        const username = document.getElementById('signupUsername').value.trim();
        const description = document.getElementById('signupDescription').value.trim();
        const email = document.getElementById('signupEmail').value.trim();
        const otp = document.getElementById('signupOtp').value.trim();
        const pass = document.getElementById('signupPass').value;
        const msg = document.getElementById('signupMsg');
        setMsg(msg, '');

        if (!email || !pass || !otp) { setMsg(msg, 'Please fill in all fields.', 'error'); return; }
        if (pass.length < 6) { setMsg(msg, 'Password must be at least 6 characters.', 'error'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { setMsg(msg, 'Enter a valid email address.', 'error'); shake(document.getElementById('signupEmail')); return; }
        if (!otp || !verifyOtp(email, otp)) { setMsg(msg, 'Invalid or expired OTP code. Request a new OTP.', 'error'); return; }

        const userId = emailToId(email);
        try {
          const existing = await getDoc(doc(db, 'users', userId));
          if (existing.exists()) { setMsg(msg, 'Account already exists. Please sign in.', 'error'); return; }

          await setDoc(doc(db, 'users', userId), {
            email,
            username: '',
            usernameLower: '',
            password: pass,
            status: description || "Hey there! I'm using FastLine.",
            draftUsername: username || '',
            avatar: '',
            online: true,
            createdAt: serverTimestamp(),
            lastSeen: serverTimestamp()
          });

          setMsg(msg, 'Account created!', 'success');
          localStorage.removeItem(OTP_KEY);
          clearSignupDraft();
          saveSession(email);
          toast('Welcome to FastLine Chats!');
          setTimeout(() => { window.location.href = 'profile.html'; }, 600);
        } catch (err) {
          setMsg(msg, 'Error: ' + err.message, 'error');
        }
      });

      // Persist signup data between refresh/tab close
      ['signupUsername', 'signupDescription', 'signupEmail', 'signupOtp'].forEach(id => {
        document.getElementById(id).addEventListener('input', saveSignupDraft);
      });

      loadSignupDraft();
      const savedTab = localStorage.getItem('fastline_active_auth_tab') || 'login';
      switchTab(savedTab);

      // If OTP already requested and still valid, keep user on signup page
      try {
        const otpRaw = localStorage.getItem(OTP_KEY);
        if (otpRaw) {
          const otpData = JSON.parse(otpRaw);
          if (otpData?.expiresAt && Date.now() < otpData.expiresAt) {
            switchTab('signup');
            const msg = document.getElementById('signupMsg');
            setMsg(msg, 'OTP was already sent. Enter it to continue registration.', 'success');
          } else {
            localStorage.removeItem(OTP_KEY);
          }
        }
      } catch {
        localStorage.removeItem(OTP_KEY);
      }

      // Enter key support
      document.getElementById('loginEmail').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
      document.getElementById('loginPass').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('loginBtn').click(); });
      document.getElementById('signupUsername').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('signupBtn').click(); });
      document.getElementById('signupDescription').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('signupBtn').click(); });
      document.getElementById('signupEmail').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('signupBtn').click(); });
      document.getElementById('signupOtp').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('signupBtn').click(); });
      document.getElementById('signupPass').addEventListener('keypress', e => { if (e.key === 'Enter') document.getElementById('signupBtn').click(); });

      // Particles
      document.addEventListener("DOMContentLoaded", () => {
        const pc = document.getElementById("particlesContainer");
        for (let i = 0; i < 40; i++) {
          const p = document.createElement("div");
          p.className = "particle";
          const size = Math.random() * 4 + 1;
          const color = Math.random() > 0.6 ? "#00BFFF" : Math.random() > 0.5 ? "#FF6B00" : "#7DF9FF";
          p.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;background:${color};opacity:.7;animation-duration:${Math.random()*14+6}s;animation-delay:${Math.random()*10}s;`;
          pc.appendChild(p);
        }
      });
    </script>
  </body>
</html>
