<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#00BFFF" />
    <link rel="manifest" href="manifest.json" />
    <title>FastLine Chats</title>
    <link rel="shortcut icon" href="icon-192.png" type="image/png" />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --bg: #0e0e10; --accent: #00bfff; --accent2: #ff6b00; --text: #ffffff; --muted: rgba(255,255,255,0.65); }
      body {
        font-family: "DM Sans", sans-serif;
        background: radial-gradient(ellipse at 20% 20%, rgba(0,191,255,0.2), transparent 55%), radial-gradient(ellipse at 80% 80%, rgba(255,107,0,0.12), transparent 55%), var(--bg);
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: var(--text);
        overflow: hidden;
      }
      .splash { text-align: center; padding: 28px; width: min(92vw, 420px); }
      .logo-wrap {
        width: 96px; height: 96px; margin: 0 auto 18px; border-radius: 24px;
        border: 2px solid rgba(0,191,255,0.5);
        background: linear-gradient(135deg, rgba(0,191,255,0.18), rgba(255,107,0,0.12));
        display: grid; place-items: center; box-shadow: 0 0 24px rgba(0,191,255,0.3);
        animation: pulse 1.8s ease-in-out infinite alternate;
      }
      .logo-wrap span { font-family: "Syne", sans-serif; font-size: 2rem; font-weight: 800; color: var(--accent); }
      .brand {
        font-family: "Syne", sans-serif; font-size: 2rem; letter-spacing: 1.4px;
        background: linear-gradient(120deg, #00bfff, #7df9ff);
        -webkit-background-clip: text; background-clip: text; color: transparent;
      }
      .hint { margin-top: 8px; color: var(--muted); font-size: 0.9rem; }
      .loader { margin: 20px auto 0; width: 210px; height: 5px; border-radius: 999px; background: rgba(255,255,255,0.12); overflow: hidden; }
      .loader::after { content: ""; display: block; width: 42%; height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); animation: move 1.1s ease-in-out infinite; }
      .status { margin-top: 10px; color: var(--muted); font-size: 0.82rem; min-height: 1.2em; }
      @keyframes pulse { from { transform: scale(0.98); box-shadow: 0 0 18px rgba(0,191,255,0.2); } to { transform: scale(1.02); box-shadow: 0 0 32px rgba(0,191,255,0.45); } }
      @keyframes move { from { transform: translateX(-110%); } to { transform: translateX(330%); } }
    </style>
  </head>
  <body>
    <main class="splash">
      <div class="logo-wrap"><span>FL</span></div>
      <h1 class="brand">FASTLINE</h1>
      <p class="hint">Fast Connections - Smart Future</p>
      <div class="loader"></div>
      <p class="status" id="statusText">Loading...</p>
    </main>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "./scripts/mock-firebase-app.js",
          "firebase/firestore": "./scripts/mock-firebase-firestore.js"
        }
      }
    </script>
    <script type="module">
      import { initializeApp } from "firebase/app";
      import { getFirestore, doc, getDoc } from "firebase/firestore";
      const statusText = document.getElementById("statusText");
      const SPLASH_DELAY_MS = 1400;
      const SESSION_EMAIL_KEY = "fastline_session_email";
      const SESSION_EXPIRY_KEY = "fastline_session_expiry";
      const firebaseConfig = { apiKey: "local", authDomain: "local", projectId: "fastline-local", storageBucket: "local", messagingSenderId: "0", appId: "0" };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const emailToId = (email) => email.toLowerCase().replace(/[^a-z0-9]/g, "_");
      const getSession = () => {
        const email = localStorage.getItem(SESSION_EMAIL_KEY);
        const expires = +localStorage.getItem(SESSION_EXPIRY_KEY);
        return email && Date.now() < expires ? email : null;
      };
      async function resolveRoute() {
        const sessionEmail = getSession();
        if (!sessionEmail) return "login.html";
        try {
          const userSnap = await getDoc(doc(db, "users", emailToId(sessionEmail)));
          if (!userSnap.exists()) return "profile.html";
          const username = (userSnap.data().username || "").trim();
          return username ? "fast.html" : "profile.html";
        } catch {
          return "login.html";
        }
      }
      const start = Date.now();
      const targetRoute = await resolveRoute();
      const elapsed = Date.now() - start;
      const wait = Math.max(0, SPLASH_DELAY_MS - elapsed);
      statusText.textContent = "Preparing your chat...";
      setTimeout(() => { window.location.href = targetRoute; }, wait);
    </script>
  </body>
</html>
