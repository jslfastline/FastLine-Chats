<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#00BFFF" />
  <link rel="manifest" href="manifest.json" />
  <title>FastLine | Setup Profile</title>
  <link rel="shortcut icon" href="icon-192.png" type="image/png" />
  <script src="scripts/theme-boot.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --bg: #0E0E10; --accent: #00BFFF; --accent2: #FF6B00; --surface: rgba(20,20,26,0.95); --text: #fff; --text-muted: rgba(255,255,255,0.5); --border: rgba(0,191,255,0.2); --error: #ff3366; --success: #00e676; }
    body { font-family: "Times New Roman", Times, serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
    .bg-layer { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 80% 60% at 20% 30%, rgba(0,191,255,0.12) 0%, transparent 70%), radial-gradient(ellipse 60% 50% at 80% 70%, rgba(255,107,0,0.08) 0%, transparent 70%), #0E0E10; }
    .grid-lines { position: fixed; inset: 0; z-index: 0; background-image: linear-gradient(rgba(0,191,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(0,191,255,0.04) 1px, transparent 1px); background-size: 60px 60px; }
    .card { position: relative; z-index: 10; width: 100%; max-width: 460px; margin: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 28px; box-shadow: 0 24px 64px rgba(0,0,0,.5); backdrop-filter: blur(20px); animation: slideUp .6s cubic-bezier(.2,.9,.4,1.1); }
    @keyframes slideUp { from{opacity:0;transform:translateY(28px)} to{opacity:1;transform:none} }
    .card-inner { padding: 2.4rem 2rem; }
    .step-header { text-align: center; margin-bottom: 2rem; }
    .step-icon { width: 64px; height: 64px; border-radius: 18px; background: rgba(0,191,255,.1); border: 2px solid rgba(0,191,255,.25); color: var(--accent); font-size: 1.6rem; display: flex; align-items: center; justify-content: center; margin: 0 auto 1rem; box-shadow: 0 0 24px rgba(0,191,255,.15); }
    h1 { font-family: "Times New Roman", Times, serif; font-size: 1.5rem; font-weight: 800; background: linear-gradient(120deg, var(--accent), #7DF9FF); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .sub { font-size: .85rem; color: var(--text-muted); margin-top: .4rem; }
    .avatar-section { text-align: center; margin-bottom: 1.6rem; }
    .avatar-ring { width: 100px; height: 100px; border-radius: 50%; margin: 0 auto .8rem; position: relative; cursor: pointer; }
    .avatar-ring img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; border: 3px solid var(--accent); }
    .avatar-ring .cam-btn { position: absolute; bottom: 4px; right: 4px; width: 30px; height: 30px; border-radius: 50%; border: 2px solid var(--bg); background: var(--accent); color: #000; font-size: .8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .avatar-hint { font-size: .75rem; color: var(--text-muted); }
    .form-group { margin-bottom: 1.3rem; }
    label { display: block; font-size: .75rem; font-weight: 600; color: var(--text-muted); margin-bottom: .45rem; letter-spacing: .5px; text-transform: uppercase; }
    .input-field { width: 100%; background: rgba(0,191,255,.05); border: 1.5px solid var(--border); border-radius: 14px; padding: 12px 15px; font-size: .92rem; color: var(--text); font-family: inherit; outline: none; transition: all .2s; }
    .input-field::placeholder { color: var(--text-muted); }
    .input-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,191,255,.1); background: rgba(0,191,255,.08); }
    .btn-primary { width: 100%; background: linear-gradient(135deg, #00BFFF, #1E90FF); border: none; border-radius: 14px; padding: 14px; font-family: "Times New Roman", Times, serif; font-size: .95rem; font-weight: 700; color: #000; letter-spacing: .5px; cursor: pointer; transition: all .2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 24px rgba(0,191,255,.4); }
    .btn-primary:disabled { opacity: .65; cursor: not-allowed; transform: none; }
    .msg { font-size: .8rem; min-height: 1.2em; margin-top: .5rem; }
    .msg.error { color: var(--error); }
    .msg.success { color: var(--success); }
    .powered { text-align: center; font-size: .65rem; letter-spacing: 1.5px; color: var(--text-muted); margin-top: 1.4rem; padding-top: 1rem; border-top: 1px solid rgba(255,255,255,.06); }
    .notice { margin-bottom: 1rem; font-size: .82rem; color: #7df9ff; background: rgba(0,191,255,.08); border: 1px solid rgba(0,191,255,.25); border-radius: 10px; padding: 10px 12px; text-align: center; }
    .theme-fab-auth {
      position: fixed; top: 16px; right: 16px; z-index: 20; width: 42px; height: 42px;
      border-radius: 50%; border: 1px solid var(--border); background: var(--surface);
      color: var(--accent); cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }
  </style>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<button type="button" class="theme-fab-auth" id="authThemeToggle" title="Toggle light/dark mode"><i class="fas fa-moon"></i></button>
<div class="bg-layer"></div>
<div class="grid-lines"></div>

<div class="card">
  <div class="card-inner">
    <div class="notice">Complete your profile picture and display name to unlock chat.</div>
    <div class="step-header">
      <div class="step-icon"><i class="fas fa-user-astronaut"></i></div>
      <h1>Set Up Your Profile</h1>
      <p class="sub">Choose a name and photo so others can find you</p>
    </div>

    <div class="avatar-section">
      <div class="avatar-ring" id="avatarRing">
        <img src="default-profile.png" alt="Avatar" id="avatarPreview" onerror="this.src='https://ui-avatars.com/api/?name=U&background=00BFFF&color=000'" />
        <button class="cam-btn" type="button"><i class="fas fa-camera"></i></button>
      </div>
      <div class="avatar-hint">Tap to upload a photo</div>
      <input type="file" id="avatarFile" accept="image/*" hidden />
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="emailField" class="input-field" readonly />
    </div>

    <div class="form-group">
      <label>Display Name <span style="color:var(--accent)">*</span></label>
      <input type="text" id="displayName" class="input-field" placeholder="Your full name" maxlength="40" />
    </div>

    <div class="form-group">
      <label>Status Message</label>
      <input type="text" id="statusMsg" class="input-field" placeholder="Hey there! I'm using FastLine." maxlength="80" />
    </div>

    <button class="btn-primary" id="saveBtn"><i class="fas fa-rocket"></i> Enter FastLine</button>
    <div class="msg" id="formMsg"></div>
    <div class="powered"><i class="fas fa-bolt"></i> FastLine Chats · Secure · Realtime</div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
    "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
    "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js"
  }
}
</script>
<script type="module">
  import { db, storage } from './scripts/firebase-config.js';
  import { doc, setDoc, getDoc, serverTimestamp, collection, query, where, getDocs } from 'firebase/firestore';
  import { ref, uploadBytes, getDownloadURL } from 'firebase/storage';
  import { getSession, emailToId, normalizeEmail } from './scripts/session.js';
  import { navigateTo } from './scripts/nav.js';

  const normalizeUsername = (value) => value.trim().toLowerCase();

  const email = getSession();
  if (!email) { navigateTo('login.html'); }

  let avatarUrl = null;

  const avatarRing = document.getElementById('avatarRing');
  const avatarFile = document.getElementById('avatarFile');
  const avatarPreview = document.getElementById('avatarPreview');
  const emailField = document.getElementById('emailField');
  const saveBtn = document.getElementById('saveBtn');
  const formMsg = document.getElementById('formMsg');

  async function isUsernameTaken(name, currentUserId) {
    const usernameLower = normalizeUsername(name);
    if (!usernameLower) return false;
    const snap = await getDocs(query(collection(db, 'users'), where('usernameLower', '==', usernameLower)));
    return snap.docs.some(d => d.id !== currentUserId);
  }

  async function preloadProfile() {
    emailField.value = email;
    try {
      const userId = emailToId(email);
      const snap = await getDoc(doc(db, 'users', userId));
      if (!snap.exists()) return;
      const data = snap.data();
      if (data.username) document.getElementById('displayName').value = data.username;
      else if (data.draftUsername) document.getElementById('displayName').value = data.draftUsername;
      if (data.status) document.getElementById('statusMsg').value = data.status;
      if (data.avatar) {
        avatarUrl = data.avatar;
        avatarPreview.src = data.avatar;
      }
    } catch {
      // keep default UI values
    }
  }

  avatarRing.addEventListener('click', () => avatarFile.click());

  avatarFile.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    const { openImageCropper } = await import('./components/image-cropper.js');
    const blob = await openImageCropper(file, { shape: 'circle', size: 'medium' });
    avatarFile.value = '';
    if (!blob) return;
    const croppedFile = new File([blob], 'avatar.jpg', { type: 'image/jpeg' });
    const dt = new DataTransfer();
    dt.items.add(croppedFile);
    avatarFile.files = dt.files;
    const reader = new FileReader();
    reader.onload = () => { avatarPreview.src = reader.result; };
    reader.readAsDataURL(blob);
  });

  saveBtn.addEventListener('click', async () => {
    const name   = document.getElementById('displayName').value.trim();
    const status = document.getElementById('statusMsg').value.trim() || "Hey there! I'm using FastLine.";
    formMsg.textContent = '';

    if (!name) { formMsg.textContent = '⚠️ Display name is required.'; formMsg.className = 'msg error'; return; }
    if (!avatarFile.files[0] && !(avatarUrl || '').trim()) {
      formMsg.textContent = '⚠️ Profile picture is required.';
      formMsg.className = 'msg error';
      return;
    }

    saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…'; saveBtn.disabled = true;

    try {
      const userId = emailToId(email);
      if (await isUsernameTaken(name, userId)) {
        formMsg.textContent = 'This username is already taken. Please choose another one.';
        formMsg.className = 'msg error';
        saveBtn.innerHTML = '<i class="fas fa-rocket"></i> Enter FastLine';
        saveBtn.disabled = false;
        return;
      }
      const usernameLower = normalizeUsername(name);

      if (avatarFile.files[0]) {
        const sRef = ref(storage, `avatars/${userId}`);
        await uploadBytes(sRef, avatarFile.files[0]);
        avatarUrl = await getDownloadURL(sRef);
      }

      await setDoc(doc(db, 'users', userId), {
        email, username: name, status,
        usernameLower,
        avatar: avatarUrl || '',
        profileCompleted: true,
        online: true,
        createdAt: serverTimestamp(),
        lastSeen: serverTimestamp()
      }, { merge: true });

      localStorage.setItem('fastline_username', name);
      formMsg.textContent = '✓ Profile saved! Entering FastLine…';
      formMsg.className = 'msg success';
      setTimeout(() => navigateTo('fast.html'), 900);
    } catch (err) {
      formMsg.textContent = '❌ Error: ' + err.message;
      formMsg.className = 'msg error';
      saveBtn.innerHTML = '<i class="fas fa-rocket"></i> Enter FastLine'; saveBtn.disabled = false;
    }
  });

  preloadProfile();

  const authThemeBtn = document.getElementById('authThemeToggle');
  const isLight = localStorage.getItem('fastline_theme') === 'light';
  authThemeBtn.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
  authThemeBtn.addEventListener('click', () => {
    localStorage.setItem('fastline_theme', isLight ? 'dark' : 'light');
    location.reload();
  });
</script>
</body>
</html>
