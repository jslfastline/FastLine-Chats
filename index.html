<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#00BFFF" />
    <link rel="manifest" href="manifest.json" />
    <title>FastLine Chats</title>
    <link rel="shortcut icon" href="icon-512.png" type="image/png" />
    <script src="scripts/theme-boot.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --bg:#0e0e10; --accent:#00bfff; --muted:rgba(255,255,255,0.72); }
      body {
        font-family: "Times New Roman", Times, serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #fff;
        background:
          radial-gradient(ellipse at 25% 20%, rgba(0,191,255,0.2), transparent 55%),
          radial-gradient(ellipse at 80% 75%, rgba(255,107,0,0.12), transparent 55%),
          var(--bg);
        overflow: hidden;
      }
      .splash { text-align: center; width: min(92vw, 460px); padding: 30px; }
      .logo {
        width: 132px; height: 132px; margin: 0 auto 16px; border-radius: 50%;
        border: 3px solid rgba(0,191,255,0.55); overflow: hidden;
        box-shadow: 0 0 24px rgba(0,191,255,0.35);
        animation: pulse 1.5s ease-in-out infinite alternate;
      }
      .logo img { width: 100%; height: 100%; object-fit: cover; }
      .brand { font-size: 2rem; color: #fff; letter-spacing: 1px; }
      .hint { margin-top: 8px; color: var(--muted); font-size: 1rem; }
      .loader {
        width: 220px; height: 6px; margin: 20px auto 0;
        border-radius: 999px; background: rgba(255,255,255,0.15); overflow: hidden;
      }
      .loader::after {
        content: ""; display: block; width: 40%; height: 100%;
        background: linear-gradient(90deg, #00bfff, #1e90ff);
        animation: slide 1s linear infinite;
      }
      .status { margin-top: 10px; font-size: 0.95rem; color: var(--muted); min-height: 1.2em; }
      .install-btn {
        position: fixed; right: 16px; bottom: 16px; z-index: 1000;
        border: 1px solid rgba(0,191,255,0.5); background: rgba(14,14,16,0.92);
        color: #7df9ff; border-radius: 999px; padding: 8px 12px; font-size: 0.82rem;
        font-family: "Times New Roman", Times, serif; cursor: pointer;
        box-shadow: 0 6px 16px rgba(0,0,0,0.35); display: none;
      }
      .install-btn.show { display: inline-flex; align-items: center; gap: 6px; }
      @keyframes pulse { from { transform: scale(0.98); } to { transform: scale(1.02); } }
      @keyframes slide { from { transform: translateX(-120%); } to { transform: translateX(320%); } }
    </style>
  </head>
  <body>
    <main class="splash">
      <div class="logo"><img src="icon-512.png" alt="FastLine" /></div>
      <h1 class="brand">FastLine Chats</h1>
      <p class="hint">Loading secure setup...</p>
      <div class="loader"></div>
      <p class="status" id="splashStatus">Checking session…</p>
    </main>
    <button id="installAppBtn" class="install-btn" type="button">Install App</button>

    <script type="importmap">
      {
        "imports": {
          "firebase/app": "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js",
          "firebase/firestore": "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js",
          "firebase/storage": "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js"
        }
      }
    </script>

    <script type="module">
      import { db } from "./scripts/firebase-config.js";
      import { getSession, clearSession } from "./scripts/session.js";
      import { navigateTo, resolvePostAuthRoute } from "./scripts/nav.js";

      const statusEl = document.getElementById("splashStatus");
      const MIN_SPLASH_MS = 900;

      async function boot() {
        const started = Date.now();
        let target = "login.html";

        try {
          statusEl.textContent = "Connecting…";
          const email = getSession();
          if (email) {
            statusEl.textContent = "Restoring your session…";
            target = await resolvePostAuthRoute(db, email);
            if (target === "login.html") clearSession(false);
          } else {
            statusEl.textContent = "Welcome — opening sign in…";
          }
        } catch (err) {
          console.error("[Boot]", err);
          statusEl.textContent = "Opening sign in…";
          target = "login.html";
        }

        const elapsed = Date.now() - started;
        const wait = Math.max(0, MIN_SPLASH_MS - elapsed);
        statusEl.textContent = "Redirecting…";
        setTimeout(() => navigateTo(target), wait);
      }

      boot();
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js', { scope: './' }).catch(() => {});
        });
      }

      const installBtn = document.getElementById('installAppBtn');
      let deferredPrompt = null;
      const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
      const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;

      const hideInstall = () => {
        installBtn.classList.remove('show');
        installBtn.style.display = 'none';
        localStorage.setItem('fastline_pwa_installed', '1');
      };

      if (isStandalone || localStorage.getItem('fastline_pwa_installed') === '1') {
        hideInstall();
      } else if (isIos) {
        installBtn.classList.add('show');
      }

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (!isStandalone && localStorage.getItem('fastline_pwa_installed') !== '1') {
          installBtn.classList.add('show');
        }
      });

      window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        hideInstall();
      });

      installBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          deferredPrompt = null;
          if (outcome === 'accepted') hideInstall();
          return;
        }
        if (isIos) alert('On iPhone/iPad: tap Share then "Add to Home Screen".');
        else alert('Use your browser menu → Install app / Add to Home Screen.');
      });
    </script>
  </body>
</html>
