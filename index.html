<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#00BFFF" />
    <link rel="manifest" href="manifest.json" />
    <title>JSL FastLine</title>
    <link rel="shortcut icon" href="icon-512.png" type="image/png" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      :root { --bg:#0e0e10; --accent:#00bfff; --muted:rgba(255,255,255,0.72); }
      body {
        font-family: "Times New Roman", Times, serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: #fff;
        background:
          radial-gradient(ellipse at 25% 20%, rgba(0,191,255,0.2), transparent 55%),
          radial-gradient(ellipse at 80% 75%, rgba(255,107,0,0.12), transparent 55%),
          var(--bg);
        overflow: hidden;
      }
      .splash { text-align: center; width: min(92vw, 460px); padding: 30px; }
      .logo {
        width: 132px;
        height: 132px;
        margin: 0 auto 16px;
        border-radius: 50%;
        border: 3px solid rgba(0,191,255,0.55);
        overflow: hidden;
        box-shadow: 0 0 24px rgba(0,191,255,0.35);
        animation: pulse 1.5s ease-in-out infinite alternate;
      }
      .logo img { width: 100%; height: 100%; object-fit: cover; }
      .brand { font-size: 2rem; color: #fff; letter-spacing: 1px; }
      .hint { margin-top: 8px; color: var(--muted); font-size: 1rem; }
      .loader {
        width: 220px; height: 6px; margin: 20px auto 0;
        border-radius: 999px; background: rgba(255,255,255,0.15); overflow: hidden;
      }
      .loader::after {
        content: ""; display: block; width: 40%; height: 100%;
        background: linear-gradient(90deg, #00bfff, #1e90ff);
        animation: slide 1s linear infinite;
      }
      .status { margin-top: 10px; font-size: 0.95rem; color: var(--muted); }
      @keyframes pulse { from { transform: scale(0.98); } to { transform: scale(1.02); } }
      @keyframes slide { from { transform: translateX(-120%); } to { transform: translateX(320%); } }
    </style>
  </head>
  <body>
    <main class="splash">
      <div class="logo"><img src="icon-512.png" alt="JSL FastLine" /></div>
      <h1 class="brand">JSL FastLine</h1>
      <p class="hint">Loading secure setup...</p>
      <div class="loader"></div>
      <p class="status">Please wait 5 seconds...</p>
    </main>
    <script type="importmap">
      {
        "imports": {
          "firebase/app": "./scripts/mock-firebase-app.js",
          "firebase/firestore": "./scripts/mock-firebase-firestore.js"
        }
      }
    </script>
    <script type="module">
      import { initializeApp } from "firebase/app";
      import { getFirestore, doc, getDoc } from "firebase/firestore";

      const firebaseConfig = { apiKey: "local", authDomain: "local", projectId: "fastline-local", storageBucket: "local", messagingSenderId: "0", appId: "0" };
      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const SESSION_EMAIL_KEY = "fastline_session_email";
      const SESSION_EXPIRY_KEY = "fastline_session_expiry";
      const emailToId = (email) => email.toLowerCase().replace(/[^a-z0-9]/g, "_");

      const getSession = () => {
        const email = localStorage.getItem(SESSION_EMAIL_KEY);
        const expires = +localStorage.getItem(SESSION_EXPIRY_KEY);
        return email && Date.now() < expires ? email : null;
      };

      const clearSession = () => {
        localStorage.removeItem(SESSION_EMAIL_KEY);
        localStorage.removeItem(SESSION_EXPIRY_KEY);
      };

      const isProfileComplete = (user) => {
        const hasUsername = !!(user?.username || "").trim();
        const hasAvatar = !!(user?.avatar || "").trim();
        return hasUsername && hasAvatar;
      };

      async function getTargetRoute() {
        const email = getSession();
        if (!email) return "login.html";
        try {
          const snap = await getDoc(doc(db, "users", emailToId(email)));
          if (!snap.exists()) {
            clearSession();
            return "login.html";
          }
          return isProfileComplete(snap.data()) ? "fast.html" : "profile.html";
        } catch {
          return "login.html";
        }
      }

      const targetRoute = await getTargetRoute();
      setTimeout(() => {
        window.location.href = targetRoute;
      }, 5000);
    </script>
  </body>
</html>
